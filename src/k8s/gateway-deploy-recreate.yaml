apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway-service:v2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8087
        env:
        - name: SESSION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SESSION_SERVICE_URL
        - name: HOTEL_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: HOTEL_SERVICE_URL
        - name: BOOKING_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: BOOKING_SERVICE_URL
        - name: LOYALTY_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOYALTY_SERVICE_URL
        - name: REPORT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REPORT_SERVICE_URL
        - name: GATEWAY_SERVICE_UUID
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: GATEWAY_SERVICE_UUID
        - name: PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: PRIVATE_KEY
        - name: PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: PUBLIC_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  selector:
    app: gateway
  ports:
  - port: 8087
    targetPort: 8087
  type: ClusterIP